    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Titillium+Web:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>

        .sidebar-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(2px);
            z-index: 90;
        }

            width: 300px;
            max-height: 320px;
            overflow-y: auto;
        }

            border: 1px solid #2E2E2E;
            background: #1a1a1a;
        }
        .notif-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .notif-scroll::-webkit-scrollbar-thumb {

</head>
<body class="bg-[#181818] text-gray-200 antialiased font-sans min-h-screen overflow-x-hidden">

<div id="sidebarOverlay" class="sidebar-overlay hidden md:hidden"></div>

<aside id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-[#181818] border-r border-[#2E2E2E] z-[100] overflow-y-auto transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-out">
    <div class="px-8 py-7 flex items-center justify-between">
        <div class="flex flex-col gap-1">
            <div class="flex items-center gap-2">
                <img src="https://iili.io/BY5xcss.jpg" alt="Logo" class="w-6 h-6 rounded-full">
                <h2 class="text-base font-bold text-white leading-none font-mono">Xdvxrlru.zz</h2>
            </div>
            <p class="text-xs text-gray-500 leading-none">API Documentation</p>
        </div>
        <button id="sidebarCloseBtn" class="text-white md:hidden"><i class="material-icons text-2xl">close</i></button>
    </div>
    <div class="px-5 pb-8">
        <button onclick="window.toggleMenu('menu-get-started', 'icon-get-started')" class="w-full flex items-center justify-between font-medium text-xs text-gray-500 tracking-widest mb-3 px-4 hover:text-gray-300 focus:outline-none">
            <span class="uppercase">Get Started</span>
            <i id="icon-get-started" class="material-icons text-sm transition-transform duration-200 rotate-180">expand_more</i>
        </button>
        <div id="menu-get-started" class="space-y-1 mb-5 transition-all">
            <a href="/" class="flex items-center justify-between py-1.5 px-4 text-sm text-gray-400 hover:bg-[#222222] hover:text-white rounded-xl transition-colors">
                <span>Dashboard</span><i class="material-icons text-lg">keyboard_arrow_right</i>
            </a>
            <a href="/docs" class="flex items-center justify-between py-1.5 px-4 text-sm text-gray-400 hover:bg-[#222222] hover:text-white rounded-xl transition-colors">
                <span>Documentation</span><i class="material-icons text-lg">keyboard_arrow_right</i>
            </a>
        </div>
        <button onclick="window.toggleMenu('sidebar-categories', 'icon-categories')" class="w-full flex items-center justify-between font-medium text-xs text-gray-500 tracking-widest mb-3 px-4 hover:text-gray-300 focus:outline-none">
            <span class="uppercase">Endpoints</span>
            <i id="icon-categories" class="material-icons text-sm transition-transform duration-200 rotate-180">expand_more</i>
        </button>
        <div class="space-y-1 mb-5 transition-all" id="sidebar-categories"></div>
    </div>
</aside>

<header class="md:ml-64 relative z-[80]">
    <div class="max-w-2xl mx-auto px-8 py-6 flex items-center justify-between">
        <button id="sidebarToggle" class="text-white md:hidden"><i class="material-icons text-2xl">notes</i></button>
        <div class="ml-auto flex items-center gap-3">
            <div class="relative overflow-visible">
                <button id="notifBtn" class="relative w-9 h-9 flex items-center justify-center rounded-lg bg-[#1a1a1a] border border-[#2E2E2E] text-gray-400 hover:text-white transition-colors">
                    <span class="material-icons text-[20px]">notifications_none</span>
                    <span id="notifBadge" class="hidden absolute -top-1 -right-1 min-w-4 h-4 px-1 rounded-full bg-red-500 text-[10px] leading-4 text-white text-center font-bold">0</span>
                </button>
                <div id="notifPanel" class="notif-panel hidden fixed right-3 top-16 md:absolute md:right-0 md:top-auto md:mt-2 bg-[#212121] border border-[#2E2E2E] rounded-xl shadow-2xl z-[9999] overflow-hidden pointer-events-auto">
                    <div class="px-4 py-3 border-b border-[#2E2E2E] flex items-center justify-between">

                    <div id="notifList" class="notif-scroll max-h-72 overflow-y-auto p-2 space-y-2"></div>
                </div>
            </div>
            <a href="https://wa.me/556298777843" target="_blank" class="text-gray-500 hover:text-white transition-colors text-xs">Contact</a>
            <a href="https://whatsapp.com/channel/0029Vb4cQJu2f3EB7BS7o11M" target="_blank" class="text-gray-500 hover:text-white transition-colors text-xs">Channel</a>
        </div>
    </div>
</header>

<div class="flex flex-col min-h-screen md:ml-64">
    <main class="max-w-2xl mx-auto px-8 pt-2 pb-16 flex-1 w-full">
        <section class="mb-8">
            <div class="flex items-center gap-3 mb-1">
                <a href="/" class="text-gray-500 hover:text-white transition-colors text-xs flex items-center gap-1">
                    <i class="material-icons text-sm">arrow_back</i> Back
                </a>
            </div>
            <div class="flex items-center gap-3 mt-3">
                <h1 id="page-title" class="text-3xl font-bold text-white">All Endpoints</h1>
                <span id="page-count" class="px-2.5 py-0.5 text-xs text-gray-400 bg-[#2a2a2a] border border-[#3a3a3a] rounded-md font-mono"></span>
            </div>
            <p id="page-desc" class="text-xs text-gray-500 mt-2">Explore all endpoints and features.</p>
        </section>

        <div class="mb-6">
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <span class="material-icons text-gray-600 text-xl">search</span>
                </div>
                <input type="text" id="searchInput" placeholder="Search endpoints..." class="w-full pl-12 pr-5 py-3 border border-[#2E2E2E] bg-[#212121] text-gray-300 placeholder-gray-600 focus:outline-none focus:border-[#444] rounded-xl text-sm font-mono">
            </div>
        </div>

        <div id="apiList" class="space-y-3"></div>
        <div id="noResults" class="text-center py-16 hidden"><p class="text-xs text-gray-500">No result found.</p></div>
    </main>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
<script>
    let endpointsData = [];
    const mediaStore = new Map();

    const NOTIF_KEY = 'xdvx_notifications_docs';
    const NOTIF_LIMIT = 5;

    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    const sidebarToggle = document.getElementById('sidebarToggle');
    const sidebarCloseBtn = document.getElementById('sidebarCloseBtn');

    const notifBtn = document.getElementById('notifBtn');
    const notifPanel = document.getElementById('notifPanel');
    const notifList = document.getElementById('notifList');
    const notifBadge = document.getElementById('notifBadge');
    const clearNotifsBtn = document.getElementById('clearNotifsBtn');

    let notifications = [];

    function loadNotifications() {
        try {
            const raw = localStorage.getItem(NOTIF_KEY);
            notifications = raw ? JSON.parse(raw) : [];
            if (!Array.isArray(notifications)) notifications = [];
        } catch (e) {
            notifications = [];
        }
        renderNotifications();
    }

    function saveNotifications() {
        localStorage.setItem(NOTIF_KEY, JSON.stringify(notifications.slice(0, NOTIF_LIMIT)));
    }

    function notify(title, message, type = 'info') {
        const item = {
            id: Date.now() + Math.random().toString(16).slice(2),
            title,
            message,
            type,
            time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        };
        notifications.unshift(item);
        notifications = notifications.slice(0, NOTIF_LIMIT);
        saveNotifications();
        renderNotifications();
    }

    function iconForType(type) {
        if (type === 'success') return 'check_circle';
        if (type === 'warning') return 'warning';
        if (type === 'error') return 'error';
        return 'notifications';
    }

    function typeClass(type) {
        if (type === 'success') return 'text-green-400';
        if (type === 'warning') return 'text-yellow-400';
        if (type === 'error') return 'text-red-400';
        return 'text-blue-400';
    }

    function renderNotifications() {
        notifBadge.textContent = notifications.length;
        notifBadge.classList.toggle('hidden', notifications.length === 0);

        notifList.innerHTML = notifications.length
            ? notifications.map(n => `
                <div class="notif-item rounded-lg p-3">
                    <div class="flex items-start gap-3">
                        <span class="material-icons text-base ${typeClass(n.type)}">${iconForType(n.type)}</span>
                        <div class="min-w-0 flex-1">
                            <div class="flex items-center justify-between gap-2">
                                <p class="text-xs font-semibold text-white truncate">${n.title}</p>
                                <span class="text-[10px] text-gray-600 font-mono">${n.time}</span>
                            </div>
                            <p class="text-[11px] text-gray-400 mt-1 leading-relaxed">${n.message}</p>
                        </div>
                    </div>
                </div>
            `).join('')
            : '<div class="p-4 text-center text-xs text-gray-500">No notifications yet.</div>';
    }

    function toggleNotifications() {
        notifPanel.classList.toggle('hidden');
    }

    notifBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        toggleNotifications();
    });

    clearNotifsBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        notifications = [];
        saveNotifications();
        renderNotifications();
    });

    document.addEventListener('click', (e) => {
        if (!notifPanel.contains(e.target) && !notifBtn.contains(e.target)) {
            notifPanel.classList.add('hidden');
        }
    });

    function openSidebar() {
        sidebar.classList.remove('-translate-x-full');
        sidebarOverlay.classList.remove('hidden');
        document.body.classList.add('overflow-hidden');
    }

    function closeSidebar() {
        sidebar.classList.add('-translate-x-full');
        sidebarOverlay.classList.add('hidden');
        document.body.classList.remove('overflow-hidden');
    }

    function syncSidebarState() {
        if (window.innerWidth >= 768) {
            sidebar.classList.remove('-translate-x-full');
            sidebarOverlay.classList.add('hidden');
            document.body.classList.remove('overflow-hidden');
        } else {
            sidebar.classList.add('-translate-x-full');
            sidebarOverlay.classList.add('hidden');
        }
    }

    async function loadDocs() {
        try {
            const res = await fetch('/api/list');
            const data = await res.json();
            endpointsData = data.data || [];

            const allCats = {};
            endpointsData.forEach(ep => {
                const raw = (ep.category || 'Uncategorized').trim();
                const n = raw.charAt(0).toUpperCase() + raw.slice(1).toLowerCase();
                if (!allCats[n]) allCats[n] = { name: n, count: 0 };
                allCats[n].count++;
            });

            const sidebarCats = document.getElementById('sidebar-categories');
            sidebarCats.innerHTML = Object.values(allCats).map(c =>
                '<a href="/docs?cat=' + encodeURIComponent(c.name.toLowerCase()) + '" class="flex items-center justify-between py-1.5 px-4 text-sm text-gray-400 hover:bg-[#222222] hover:text-white rounded-xl transition-colors"><span>' + escapeHtml(c.name) + '</span><i class="material-icons text-lg">keyboard_arrow_right</i></a>'
            ).join('');

            const urlParams = new URLSearchParams(window.location.search);
            const catFilter = urlParams.get('cat');
            const filtered = catFilter ? endpointsData.filter(ep => (ep.category || '').toLowerCase() === catFilter.toLowerCase()) : endpointsData;
            const title = catFilter ? catFilter.charAt(0).toUpperCase() + catFilter.slice(1) : 'All Endpoints';

            document.getElementById('page-title').textContent = title;
            document.getElementById('page-count').textContent = filtered.length + ' endpoint' + (filtered.length !== 1 ? 's' : '');
            document.getElementById('page-desc').textContent = 'Explore ' + title + ' endpoints and features.';
            document.title = 'Xdvxrlru.zz - ' + title;

            renderEndpoints(filtered);

            notify('Docs loaded', filtered.length + ' endpoints ready. ' + Object.keys(allCats).length + ' categories found.', 'success');
            if (catFilter) notify('Filter active', 'Category "' + catFilter + '" is selected.', 'info');
        } catch (e) {
            console.error(e);
            notify('Load failed', 'Could not load API docs.', 'error');
        }
    }

    function escapeHtml(text) {
        return String(text)
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function getFileExtension(mime) {
        const map = {
            'image/jpeg': 'jpg',
            'image/jpg': 'jpg',
            'image/png': 'png',
            'image/webp': 'webp',
            'image/gif': 'gif',
            'video/mp4': 'mp4',
            'video/webm': 'webm',
            'video/quicktime': 'mov',
            'audio/mpeg': 'mp3',
            'audio/mp3': 'mp3',
            'audio/wav': 'wav',
            'audio/ogg': 'ogg',
            'audio/webm': 'webm'
        };
        return map[(mime || '').toLowerCase()] || 'bin';
    }

    function storeMedia(blob, id) {
        const type = blob.type || 'application/octet-stream';
        const ext = getFileExtension(type);
        const file = new File([blob], 'archivo_' + Date.now() + '.' + ext, { type });
        const url = URL.createObjectURL(blob);
        const key = 'media-' + id + '-' + Date.now() + '-' + Math.random().toString(16).slice(2);
        mediaStore.set(key, { blob, file, url, type });
        return key;
    }

    function renderEndpoints(endpoints) {
        const container = document.getElementById('apiList');
        container.innerHTML = endpoints.map((item, i) => {
            const method = item.method || 'GET';
            const mClass = method === 'GET'
                ? 'text-gray-400 bg-[#2a2a2a] border-[#3a3a3a]'
                : 'text-blue-400 bg-blue-400/10 border-blue-400/20';

            let paramsHtml = '';
            if (item.parameters && item.parameters.length > 0) {
                const inner = item.parameters.map(param => {
                    const isReq = !!param.required;
                    const hasEx = !!param.example;
                    const reqAttr = (isReq && !hasEx) ? ' required' : '';
                    let inp = '';
                    if (param.type === 'file') {
                        inp = '<input type="file" name="' + escapeHtml(param.name) + '" class="w-full px-3 py-2 border border-[#2E2E2E] text-sm bg-[#1a1a1a] rounded-md text-white"' + (isReq ? ' required' : '') + '>';
                    } else {
                        inp = '<input type="text" name="' + escapeHtml(param.name) + '" placeholder="' + escapeHtml(param.example || '') + '" data-example="' + escapeHtml(param.example || '') + '" class="w-full px-3 py-2 border border-[#2E2E2E] text-sm focus:outline-none focus:border-[#444] bg-[#1a1a1a] rounded-md text-white placeholder-gray-600 font-mono"' + reqAttr + '>';
                    }
                    return '<div>' +
                        '<label class="block text-xs font-medium text-gray-300 mb-1">' + escapeHtml(param.name) + (isReq ? ' <span class="text-red-400">*</span>' : ' <span class="text-gray-600">(optional)</span>') + '</label>' +
                        inp +
                        (param.description ? '<p class="text-[11px] text-gray-600 mt-1">' + escapeHtml(param.description) + '</p>' : '') +
                    '</div>';
                }).join('');
                paramsHtml = '<div class="bg-[#212121] border border-[#2E2E2E] p-4 rounded-md mb-4"><div class="flex items-center gap-2 mb-3"><span class="material-icons text-white text-sm">tune</span><span class="text-xs font-semibold text-white uppercase tracking-wide">Parameters</span></div><div class="space-y-3">' + inner + '</div></div>';
            }

            return '<div class="bg-[#212121] border border-[#2E2E2E] api-item overflow-hidden rounded-xl" data-path="' + escapeHtml(item.endpoint || '') + '" data-alias="' + escapeHtml(item.name || '') + '">' +
                '<button type="button" onclick="window.toggleEndpoint(' + i + ')" class="w-full text-left">' +
                    '<div class="px-4 py-3.5 flex items-center justify-between gap-3">' +
                        '<div class="flex items-center min-w-0 flex-1 gap-3">' +
                            '<span class="px-2.5 py-1 text-xs font-semibold border rounded-md ' + mClass + '">' + escapeHtml(method) + '</span>' +
                            '<span class="font-medium truncate text-[0.9rem] text-white">' + escapeHtml(item.name || '') + '</span>' +
                        '</div>' +
                        '<span class="material-icons text-white flex-shrink-0" id="ep-icon-' + i + '">expand_more</span>' +
                    '</div>' +
                    '<div class="px-4 pb-3 bg-[#1e1e1e]"><span class="text-xs text-gray-500 font-mono block pt-2.5">' + escapeHtml(item.endpoint || '') + '</span></div>' +
                '</button>' +
                '<div id="ep-' + i + '" class="hidden bg-[#1a1a1a] p-5 border-t border-[#2E2E2E]">' +
                    '<div class="text-white font-bold text-xs mb-2 flex items-center"><span class="material-icons text-sm mr-1">play_arrow</span> TRY IT OUT</div>' +
                    (item.description ? '<p class="text-xs text-gray-500 mb-4">' + escapeHtml(item.description) + '</p>' : '') +
                    '<form id="form-' + i + '" onsubmit="window.executeRequest(event,' + i + ',\'' + escapeHtml(method) + '\',\'' + escapeHtml(item.endpoint || '') + '\')">' +
                        paramsHtml +
                        '<div class="flex items-center gap-2">' +
                            '<button type="submit" class="bg-[#212121] hover:bg-[#262626] border border-[#2E2E2E] font-semibold text-white px-6 py-2 text-xs rounded-md transition-colors">Execute</button>' +
                            '<button type="button" id="clear-' + i + '" onclick="window.clearResponse(' + i + ')" class="hidden bg-[#212121] hover:bg-[#262626] border border-[#2E2E2E] font-semibold text-white px-6 py-2 text-xs rounded-md transition-colors">Clear</button>' +
                        '</div>' +
                    '</form>' +
                    '<div id="res-box-' + i + '" class="hidden mt-4"><div id="res-content-' + i + '"></div></div>' +
                    '<div class="mt-6 border-t border-[#2E2E2E] pt-4">' +
                        '<div class="text-white font-bold text-xs mb-3 flex items-center"><span class="material-icons text-sm mr-1">list</span>HTTP STATUS CODES</div>' +
                        '<div class="bg-[#1a1a1a] border border-[#2E2E2E] overflow-hidden rounded-md">' +
                            '<table class="w-full text-xs">' +
                                '<thead class="bg-[#1a1a1a] border-b border-[#2E2E2E]"><tr><th class="px-4 py-2 text-left font-semibold text-white">Code</th><th class="px-4 py-2 text-left font-semibold text-white">Description</th></tr></thead>' +
                                '<tbody class="divide-y divide-[#2E2E2E]">' +
                                    '<tr><td class="px-4 py-2"><span class="font-mono font-semibold text-green-400">200</span></td><td class="px-4 py-2 text-gray-300">OK - Request successful</td></tr>' +
                                    '<tr><td class="px-4 py-2"><span class="font-mono font-semibold text-red-400">400</span></td><td class="px-4 py-2 text-gray-300">Bad Request</td></tr>' +
                                    '<tr><td class="px-4 py-2"><span class="font-mono font-semibold text-red-400">404</span></td><td class="px-4 py-2 text-gray-300">Not Found</td></tr>' +
                                    '<tr><td class="px-4 py-2"><span class="font-mono font-semibold text-red-400">500</span></td><td class="px-4 py-2 text-gray-300">Internal Server Error</td></tr>' +
                                '</tbody>' +
                            '</table>' +
                        '</div>' +
                    '</div>' +
                '</div>' +
            '</div>';
        }).join('');
    }

    window.toggleEndpoint = (id) => {
        const c = document.getElementById('ep-' + id);
        const i = document.getElementById('ep-icon-' + id);
        const hidden = c.classList.toggle('hidden');
        i.innerText = hidden ? 'expand_more' : 'expand_less';
        if (!hidden) {
            const title = document.querySelector('[onclick*="toggleEndpoint(' + id + ')"] .truncate')?.textContent || 'Endpoint';
            notify('Opened endpoint', title + ' is ready to test.', 'info');
        }
    };

    window.clearResponse = (id) => {
        document.getElementById('res-content-' + id).innerHTML = '';
        document.getElementById('res-box-' + id).classList.add('hidden');
        document.getElementById('clear-' + id).classList.add('hidden');
        notify('Response cleared', 'Endpoint response panel was cleaned.', 'info');
    };

    window.copyText = async (elId, btn) => {
        try {
            await navigator.clipboard.writeText(document.getElementById(elId).innerText);
            const orig = btn.innerHTML;
            btn.innerHTML = '<span class="material-icons text-sm">check</span>';
            setTimeout(() => btn.innerHTML = orig, 1500);
            notify('Copied', 'Text copied to clipboard.', 'success');
        } catch (e) {
            notify('Copy failed', 'Clipboard permission denied.', 'error');
        }
    };

    window.executeRequest = async (event, id, method, path) => {
        event.preventDefault();
        const form = document.getElementById('form-' + id);
        form.querySelectorAll('input[type="text"]').forEach(input => {
            if (!input.value && input.getAttribute('data-example')) {
                input.value = input.getAttribute('data-example');
            }
        });

        const resBox = document.getElementById('res-box-' + id);
        const content = document.getElementById('res-content-' + id);
        const clearBtn = document.getElementById('clear-' + id);

        resBox.classList.remove('hidden');
        const fd = new FormData(form);
        let fullPath = path;
        let hasFile = false;

        for (const [, v] of fd.entries()) {
            if (v instanceof File && v.size > 0) hasFile = true;
        }

        let curl = 'curl -X ' + method + ' "' + window.location.origin + path + '"';
        const fetchOpts = { method };

        if (['POST', 'PUT', 'PATCH'].includes(method)) {
            if (hasFile) {
                fetchOpts.body = fd;
            } else {
                const obj = {};
                fd.forEach((v, k) => obj[k] = v);
                fetchOpts.headers = { 'Content-Type': 'application/json' };
                fetchOpts.body = JSON.stringify(obj);
                curl += ' \\\n -H "Content-Type: application/json" \\\n -d \'' + JSON.stringify(obj) + '\'';
            }
        } else {
            const params = new URLSearchParams();
            for (const [k, v] of fd.entries()) {
                if (typeof v === 'string' && v) params.append(k, v);
            }
            const qs = params.toString();
            if (qs) fullPath += (path.includes('?') ? '&' : '?') + qs;
            curl = 'curl -X ' + method + ' "' + window.location.origin + fullPath + '"';
        }

        const absUrl = window.location.origin + fullPath;
        content.innerHTML = '<div class="space-y-3 slide-down"><div class="bg-[#1a1a1a] border border-[#2E2E2E] rounded-md overflow-hidden"><div class="px-4 py-2 border-b border-[#2E2E2E] flex items-center justify-between"><span class="text-xs text-gray-500 font-bold uppercase">REQUEST URL</span><button onclick="window.copyText(\'ru-' + id + '\',this)" class="copy-btn text-gray-500"><span class="material-icons text-sm">content_copy</span></button></div><div class="p-4 overflow-auto"><pre id="ru-' + id + '" class="text-white text-xs font-mono whitespace-nowrap m-0">' + escapeHtml(absUrl) + '</pre></div></div><div class="bg-[#1a1a1a] border border-[#2E2E2E] rounded-md overflow-hidden"><div class="px-4 py-2 border-b border-[#2E2E2E] flex items-center justify-between"><span class="text-xs text-gray-500 font-bold uppercase">CURL COMMAND</span><button onclick="window.copyText(\'cc-' + id + '\',this)" class="copy-btn text-gray-500"><span class="material-icons text-sm">content_copy</span></button></div><div class="p-4 overflow-auto"><pre id="cc-' + id + '" class="text-white text-xs font-mono whitespace-pre m-0">' + escapeHtml(curl) + '</pre></div></div><div id="resp-' + id + '"><div class="bg-[#1a1a1a] border border-[#2E2E2E] rounded-md overflow-hidden"><div class="px-4 py-2 border-b border-[#2E2E2E]"><span class="text-xs text-gray-500 font-bold uppercase">RESPONSE</span></div><div class="p-4 flex items-center gap-2 text-white text-xs"><span class="material-icons text-sm animate-spin">refresh</span> Processing...</div></div></div></div>';

        const respEl = document.getElementById('resp-' + id);

        try {
            const res = await fetch(fullPath, fetchOpts);
            const ct = res.headers.get('content-type') || '';

            if (ct.includes('application/json')) {
                const json = await res.json();
                respEl.innerHTML = '<div class="bg-[#1a1a1a] border border-[#2E2E2E] rounded-md overflow-hidden"><div class="px-4 py-2 border-b border-[#2E2E2E] flex items-center justify-between"><span class="text-xs text-gray-500 font-bold uppercase">RESPONSE</span><button onclick="window.copyText(\'rb-' + id + '\',this)" class="copy-btn text-gray-500"><span class="material-icons text-sm">content_copy</span></button></div><div class="p-4"><pre class="max-h-80 overflow-auto m-0"><code class="language-json text-white text-xs" id="rb-' + id + '">' + escapeHtml(JSON.stringify(json, null, 2)) + '</code></pre></div></div>';
                if (window.hljs) hljs.highlightElement(respEl.querySelector('code'));
                notify('Request done', method + ' ' + path + ' returned JSON.', 'success');
            } else if (ct.startsWith('image/')) {
                const blob = await res.blob();
                const blobUrl = URL.createObjectURL(blob);
                const mediaKey = storeMedia(blob, id);
                respEl.innerHTML = '<div class="bg-[#1a1a1a] border border-[#2E2E2E] rounded-md overflow-hidden"><div class="px-4 py-2 border-b border-[#2E2E2E]"><span class="text-xs text-gray-500 font-bold uppercase">RESPONSE</span></div><div class="p-4 flex flex-col gap-3"><img src="' + blobUrl + '" class="max-w-full h-auto rounded-md cursor-pointer" onclick="window.open(\'' + blobUrl + '\',\'_blank\')"><div class="flex gap-2"><button onclick="window.downloadMedia(\'' + mediaKey + '\')" class="bg-[#212121] border border-[#2E2E2E] px-3 py-1 rounded-md text-xs">Descargar</button><button onclick="window.shareMedia(\'' + mediaKey + '\')" class="bg-[#212121] border border-[#2E2E2E] px-3 py-1 rounded-md text-xs">Compartir</button></div></div></div>';
                notify('Request done', method + ' ' + path + ' returned an image.', 'success');
            } else if (ct.includes('video/')) {
                const blob = await res.blob();
                const blobUrl = URL.createObjectURL(blob);
                const mediaKey = storeMedia(blob, id);
                respEl.innerHTML = '<div class="bg-[#1a1a1a] border border-[#2E2E2E] rounded-md overflow-hidden"><div class="px-4 py-2 border-b border-[#2E2E2E]"><span class="text-xs text-gray-500 font-bold uppercase">RESPONSE</span></div><div class="p-4"><video src="' + blobUrl + '" controls class="max-w-full rounded-md"></video><div class="flex gap-2 mt-3"><button onclick="window.downloadMedia(\'' + mediaKey + '\')" class="bg-[#212121] border border-[#2E2E2E] px-3 py-1 rounded-md text-xs">Descargar</button><button onclick="window.shareMedia(\'' + mediaKey + '\')" class="bg-[#212121] border border-[#2E2E2E] px-3 py-1 rounded-md text-xs">Compartir</button></div></div></div>';
                notify('Request done', method + ' ' + path + ' returned a video.', 'success');
            } else if (ct.includes('audio/')) {
                const blob = await res.blob();
                const blobUrl = URL.createObjectURL(blob);
                const mediaKey = storeMedia(blob, id);
                respEl.innerHTML = '<div class="bg-[#1a1a1a] border border-[#2E2E2E] rounded-md overflow-hidden"><div class="px-4 py-2 border-b border-[#2E2E2E]"><span class="text-xs text-gray-500 font-bold uppercase">RESPONSE</span></div><div class="p-4"><audio src="' + blobUrl + '" controls class="w-full"></audio><div class="flex gap-2 mt-3"><button onclick="window.downloadMedia(\'' + mediaKey + '\')" class="bg-[#212121] border border-[#2E2E2E] px-3 py-1 rounded-md text-xs">Descargar</button><button onclick="window.shareMedia(\'' + mediaKey + '\')" class="bg-[#212121] border border-[#2E2E2E] px-3 py-1 rounded-md text-xs">Compartir</button></div></div></div>';
                notify('Request done', method + ' ' + path + ' returned audio.', 'success');
            } else {
                const text = await res.text();
                respEl.innerHTML = '<div class="bg-[#1a1a1a] border border-[#2E2E2E] rounded-md overflow-hidden"><div class="px-4 py-2 border-b border-[#2E2E2E] flex items-center justify-between"><span class="text-xs text-gray-500 font-bold uppercase">RESPONSE</span><button onclick="window.copyText(\'rb-' + id + '\',this)" class="copy-btn text-gray-500"><span class="material-icons text-sm">content_copy</span></button></div><div class="p-4"><pre class="max-h-80 overflow-auto m-0 text-xs"><code id="rb-' + id + '" class="text-white font-mono">' + escapeHtml(text) + '</code></pre></div></div>';
                notify('Request done', method + ' ' + path + ' returned text.', 'success');
            }
        } catch (err) {
            respEl.innerHTML = '<div class="bg-[#1a1a1a] border border-red-900 rounded-md overflow-hidden"><div class="px-4 py-2 border-b border-red-900"><span class="text-xs text-red-500 font-bold uppercase">ERROR</span></div><div class="p-4 text-red-400 text-xs font-mono">' + escapeHtml(err.message) + '</div></div>';
            notify('Request failed', err.message, 'error');
        }

        clearBtn.classList.remove('hidden');
    };

    window.downloadMedia = (mediaKey) => {
        const item = mediaStore.get(mediaKey);
        if (!item) {
            notify('Error', 'No se encontró el archivo.', 'error');
            return;
        }
        const a = document.createElement('a');
        a.href = item.url;
        a.download = item.file.name || ('download_' + Date.now());
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        notify('Download started', 'Media download triggered.', 'info');
    };

    window.shareMedia = async (mediaKey) => {
        const item = mediaStore.get(mediaKey);
        if (!item) {
            notify('Error', 'No se encontró el archivo para compartir.', 'error');
            return;
        }

        if (!navigator.share) {
            notify('No compatible', 'Tu navegador no soporta compartir archivos.', 'warning');
            return;
        }

        try {
            if (navigator.canShare && !navigator.canShare({ files: [item.file] })) {
                notify('No compatible', 'Tu navegador no permite compartir este tipo de archivo.', 'warning');
                return;
            }

            await navigator.share({
                title: 'Compartir archivo',
                text: 'Archivo compartido desde Xdvxrlru.zz',
                files: [item.file]
            });

            notify('Compartido', 'Archivo enviado para compartir.', 'success');
        } catch (e) {
            if (e && e.name !== 'AbortError') {
                notify('Error', 'No se pudo compartir el archivo.', 'error');
            }
        }
    };

    document.getElementById('searchInput')?.addEventListener('input', function() {
        const t = this.value.toLowerCase();
        let any = false;
        document.querySelectorAll('.api-item').forEach(item => {
            const v = item.dataset.path.toLowerCase().includes(t) || item.dataset.alias.toLowerCase().includes(t);
            item.style.display = v ? '' : 'none';
            if (v) any = true;
        });
        document.getElementById('noResults').classList.toggle('hidden', any || !t);
        if (t.length >= 2) {
            notify('Search', 'Filtering endpoints by "' + t + '".', 'info');
        }
    });

    sidebarOverlay.addEventListener('click', closeSidebar);
    sidebarToggle?.addEventListener('click', openSidebar);
    sidebarCloseBtn?.addEventListener('click', closeSidebar);

    document.querySelectorAll('#sidebar a').forEach(a => {
        a.addEventListener('click', () => {
            if (window.innerWidth < 768) closeSidebar();
        });
    });

    window.addEventListener('resize', syncSidebarState);
    document.addEventListener('DOMContentLoaded', () => {
        loadNotifications();
        syncSidebarState();
        loadDocs();
    });
</script>
</body>
</html>
